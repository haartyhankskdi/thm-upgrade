

include:
 - project: 'hyva-themes/base-ci'
   file: 'lint/php.yml'
   ref: main
 - project: 'hyva-themes/base-ci'
   file: 'static/phpcs.yml'
   ref: main

trigger:checks:
  stage: test
  tags:
    - test
  needs:
    - static:lint
    - static:phpcs
  script:
    - echo "This job is required to trigger the static:lint and the static:phpcs jobs"
