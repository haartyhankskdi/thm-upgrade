<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Elavon Challenge</title>
        <style>
            body { margin: 0; padding: 0; text-align: center; background-color: #FFFFFF; }
            iframe { border: none; width: 100%; height: 100vh; }
        </style>
    </head>
    <body>
        <iframe name="ebizmarts-challenge-frame" title="External Iframe"></iframe>
        <form id="ebizmarts-challenge-form" target="ebizmarts-challenge-frame" action="{CHALLENGE_URL}" method="POST">
            <input type="hidden" name="creq" value="{CHALLENGE_CREQ}">
        </form>
        <script>
            function docReady(fn) {
                if (document.readyState === "complete" || document.readyState === "interactive") {
                    setTimeout(fn, 1);
                } else {
                    document.addEventListener("DOMContentLoaded", fn);
                }
            }

            docReady(function() {
                const challenge_form = document.getElementById('ebizmarts-challenge-form');
                challenge_form.submit();
            });
        </script>
    </body>
</html>
